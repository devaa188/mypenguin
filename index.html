<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Brain System Check</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #f3e8ff, #ffe4f0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background: linear-gradient(160deg, #fdf0ff, #fff0f6);
padding:40px;
border-radius:16px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(200,150,220,0.2);
border: 1px solid #f0d6ff;
}

h2, h3 {
color: #9b5db5;
}

p {
color: #7a5a8a;
}

button{
margin:8px;
padding:10px 18px;
border:none;
border-radius:20px;
background: linear-gradient(135deg, #d8aaff, #ffadd3);
color:white;
font-size:14px;
cursor:pointer;
font-weight: bold;
letter-spacing: 0.3px;
transition: transform 0.1s, box-shadow 0.2s;
box-shadow: 0 4px 12px rgba(200,100,200,0.25);
}

button:hover{
background: linear-gradient(135deg, #c993f7, #ff95c5);
transform: translateY(-2px);
box-shadow: 0 6px 16px rgba(200,100,200,0.35);
}

.small{
font-size:12px;
color: #c08ad6;
margin-top:10px;
}

hr {
border: none;
border-top: 1px solid #f0d6ff;
margin: 16px 0;
}

.loader{
border:4px solid #f9e8ff;
border-top:4px solid #d8aaff;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="container" id="app">

<h2>Trisha Brain System Check</h2>
<p>Morning diagnostic running...</p>

<button onclick="startScan()">Start Scan</button>

</div>

<script>

function startScan(){

document.getElementById("app").innerHTML=`
<h3>Scanning brain activity...</h3>
<div class="loader"></div>
<p>Please wait...</p>
`;

setTimeout(showQ1,1500)

}

function showQ1(){

document.getElementById("app").innerHTML=`
<h3>Overthinking level today?</h3>

<button onclick="showQ2()">Mild</button>
<button onclick="showQ2()">Medium</button>
<button onclick="showQ2()">Bollywood</button>
`;

}

function showQ2(){

document.getElementById("app").innerHTML=`
<h3>Energy source required?</h3>

<button onclick="showQ3()">Chai</button>
<button onclick="showQ3()">Silence</button>
<button onclick="showQ3()">Causing chaos</button>
`;

}

function showQ3(){

document.getElementById("app").innerHTML=`
<h3>Mood repair method?</h3>

<button onclick="showResult()">Music</button>
<button onclick="showResult()">Walk</button>
<button onclick="showResult()">Annoy someone</button>
`;

}

function showResult(){

document.getElementById("app").innerHTML=`
<h2>Diagnosis Complete</h2>

<p><b>Slight brain overload detected.</b></p>

<p>Recommended treatment:</p>

<p>
small nonsense<br>
sunlight<br>
snacks
</p>

<hr>

<p><b>Optional bonus fix:</b></p>

<p>Annoy Devashish for 5 minutes.</p>

<p class="small">Side effect: may cause random smiling.</p>

`;

}

</script>

</body>
</html>
